<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMem</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>OpenMem</h1>
    <div id="stats" class="stats-bar">
      <span id="stat-total">—</span>
      <span id="stat-active">—</span>
      <span id="stat-strength">—</span>
      <span id="stat-edges">—</span>
    </div>
  </header>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar">
      <nav id="sidebar-nav">
        <div class="sidebar-section-label">Sources</div>
        <div class="sidebar-item active" data-source="">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3z"/></svg>
          <span class="sidebar-label">All Memories</span>
          <span class="sidebar-count" id="count-all"></span>
        </div>
        <div id="sidebar-sources"></div>
      </nav>
    </aside>

    <main>
      <div class="toolbar">
        <div class="tab-switcher">
          <button class="tab-btn active" data-tab="table">Table</button>
          <button class="tab-btn" data-tab="graph">Graph</button>
        </div>
        <input type="text" id="search-input" placeholder="Search memories..." autocomplete="off">
        <select id="filter-type">
          <option value="">All types</option>
          <option value="fact">fact</option>
          <option value="decision">decision</option>
          <option value="preference">preference</option>
          <option value="incident">incident</option>
          <option value="plan">plan</option>
          <option value="constraint">constraint</option>
        </select>
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="active">active</option>
          <option value="superseded">superseded</option>
          <option value="contradicted">contradicted</option>
        </select>
      </div>

      <div id="graph-container" class="graph-container hidden"></div>

      <table id="memory-table">
        <thead>
          <tr>
            <th data-sort="created_at" class="sortable active desc">Created</th>
            <th data-sort="source" class="sortable">Agent</th>
            <th data-sort="project" class="sortable">Project</th>
            <th data-sort="type" class="sortable">Type</th>
            <th data-sort="status" class="sortable">Status</th>
            <th data-sort="strength" class="sortable">Strength</th>
            <th data-sort="confidence" class="sortable">Conf</th>
            <th>Text</th>
          </tr>
        </thead>
        <tbody id="memory-tbody"></tbody>
      </table>

      <div id="detail-panel" class="detail-panel hidden">
        <div class="detail-header">
          <h2>Memory Detail</h2>
          <button id="detail-close" class="btn-close">&times;</button>
        </div>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
